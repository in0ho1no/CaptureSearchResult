name: Security Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - develop
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: capture-search-result/package-lock.json

      - name: Install dependencies
        working-directory: capture-search-result
        run: npm ci

      - name: Verify package signatures
        working-directory: capture-search-result
        run: npm audit signatures

      - name: Check vulnerabilities (production dependencies)
        working-directory: capture-search-result
        run: npm audit --omit=dev --audit-level=high

      - name: Check vulnerabilities (dev dependencies with allowlist)
        working-directory: capture-search-result
        run: |
          trap 'rm -f audit.json' EXIT
          npm audit --json > audit.json || true
          node scripts/check-audit.mjs audit.json
